# Cloud Build configuration
steps:
  # Build la imagen de Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/business-case-app:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/business-case-app:latest'
      - '.'

  # Push la imagen a Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/business-case-app:$SHORT_SHA'

  # Deploy en Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'business-case-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/business-case-app:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-cloudsql-instances'
      - '$PROJECT_ID:europe-west1:business-case-db'
      - '--set-secrets'
      - 'OPENAI_API_KEY=openai-api-key:latest'
      - '--set-env-vars'
      - 'NODE_ENV=production,DATABASE_URL=$$DATABASE_URL'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

  # Run migrations
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run jobs create migrate-db-$SHORT_SHA \
          --image gcr.io/$PROJECT_ID/business-case-app:$SHORT_SHA \
          --region europe-west1 \
          --set-cloudsql-instances $PROJECT_ID:europe-west1:business-case-db \
          --set-secrets OPENAI_API_KEY=openai-api-key:latest \
          --set-env-vars NODE_ENV=production,DATABASE_URL=$$DATABASE_URL \
          --command "npx" \
          --args "prisma,migrate,deploy" \
          || gcloud run jobs update migrate-db-$SHORT_SHA \
          --image gcr.io/$PROJECT_ID/business-case-app:$SHORT_SHA \
          --region europe-west1
        gcloud run jobs execute migrate-db-$SHORT_SHA --region europe-west1

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _DATABASE_URL: postgresql://postgres:postgres@localhost:5432/businesscase?host=/cloudsql/$PROJECT_ID:europe-west1:business-case-db

images:
  - 'gcr.io/$PROJECT_ID/business-case-app:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/business-case-app:latest'
